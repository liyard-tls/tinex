services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tinex
      POSTGRES_PASSWORD: tinex
      POSTGRES_DB: tinex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinex"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./backend/.env.local
    environment:
      DATABASE_URL: postgres://tinex:tinex@postgres:5432/tinex?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
